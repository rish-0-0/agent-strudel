<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Agent DJ — Strudel Generator</title>
    <link rel="stylesheet" href="styles.css" />
    <script defer src="https://unpkg.com/@strudel/repl@1.3.0"></script>
  </head>
  <body>
    <main class="card">
      <h1>Agent DJ</h1>
      <p class="subtitle">Generate a pattern, then press Play in the editor.</p>

      <div class="controls">
        <input id="prompt" type="text" class="prompt" placeholder="e.g. groovy jazz with indian fusion" />
        <button id="generate" class="primary" disabled>
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
            <path d="M12 2l2.4 6.6L21 11l-6.6 2.4L12 20l-2.4-6.6L3 11l6.6-2.4z" fill="currentColor" />
          </svg>
          <span>Generate</span>
        </button>
        <button id="play" class="play" disabled>
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
            <path d="M8 5v14l11-7z" fill="currentColor" />
          </svg>
          <span>Play</span>
        </button>
        <button id="stop" disabled>
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <path d="M6 6h12v12H6z" fill="currentColor" />
          </svg>
          <span>Stop</span>
        </button>
      </div>

      <p id="status" class="status">Loading…</p>

      <strudel-editor id="editor"><!-- sound("bd sd [bd sd] sd") --></strudel-editor>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
